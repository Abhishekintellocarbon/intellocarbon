name: Keep Render alive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          url="https://intellocarbon-api.onrender.com/api/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url")
          echo "GET $url -> $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::warning::Health check returned HTTP $code"
          fi
