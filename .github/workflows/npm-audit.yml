name: npm audit

on:
  push:
    branches: [main]

jobs:
  audit-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: npm audit
        run: |
          npm audit --json > audit-result.json || true
          node ../scripts/check-audit.js audit-result.json

  audit-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit
        run: |
          npm audit --json > audit-result.json || true
          node ../scripts/check-audit.js audit-result.json .audit-allowlist.json
