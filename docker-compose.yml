version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: intellocarbon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intellocarbon
    ports:
      - "5432:5432"
    volumes:
      - intellocarbon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  intellocarbon_postgres_data:
